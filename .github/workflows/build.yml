name: Build 夜鹭浏览器

on:
  workflow_dispatch: # 只手动触发，省 Actions 额度

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      # ── 0. 解除 Windows 路径长度限制（必须最先执行）────────────────
      - name: Enable long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          Set-ItemProperty `
            -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1

      # ── 1. 检出本仓库（含你的 patch 和图标） ──────────────────────────
      - name: Checkout yelu repo
        uses: actions/checkout@v4
        with:
          path: yelu

      # ── 2. 检出 ungoogled-chromium-windows（作为构建基础） ────────────
      - name: Checkout ungoogled-chromium-windows
        uses: actions/checkout@v4
        with:
          repository: ungoogled-software/ungoogled-chromium-windows
          path: ungoogled-chromium-windows
          submodules: recursive
          # 建议锁定到某个 tag，避免上游改动导致构建失败
          # ref: 'xxx.x.xxxx.xxx-1'

      # ── 4. 环境准备 ───────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ungoogled-chromium-windows
        run: pip install httplib2==0.22.0

      # 激活 Visual Studio 编译器环境（build.py 依赖 cl.exe / link.exe）
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Disable nocompile tests (skip x86 toolchain requirement)
        shell: bash
        working-directory: ungoogled-chromium-windows
        run: |
          echo 'enable_nocompile_tests = false' >> flags.windows.gn
          echo "flags.windows.gn now contains:"
          cat flags.windows.gn

# ── 5. 完整构建（含下载、patch、编译）────────────────────────────
      - name: Build
        working-directory: ungoogled-chromium-windows
        run: python build.py

# ── 3. 把你的品牌入到 ungoogled-chromium-windows ─────────
      - name: Inject yelu branding (string replace)
        shell: python
        working-directory: ungoogled-chromium-windows
        run: |
          from pathlib import Path

          src = Path("build/src")
          target = src / "chrome/app/chromium_strings.grd"

          text = target.read_text(encoding="utf-8")
          text = text.replace(">Chromium<", ">夜鹭浏览器<")
          text = text.replace("- Chromium<", "- 夜鹭浏览器<")
          text = text.replace("The Chromium Authors", "夜鹭整活工作室")
          target.write_text(text, encoding="utf-8")
          print("OK:", target)

      # ── 6. 替换图标（编译完成后，打包前）────────────────────────────
      - name: Replace branding icons
        shell: bash
        run: |
          SRC="ungoogled-chromium-windows/build/src"
          BRANDING="yelu/branding"

          # 替换源码树里的图标（package.py 打包时会重新读取）
          cp "$BRANDING/chrome.ico" \
             "$SRC/chrome/app/theme/chromium/win/chrome.ico"

          for size in 16 24 32 48 64 128 256; do
            if [ -f "$BRANDING/logo_${size}.png" ]; then
              cp "$BRANDING/logo_${size}.png" \
                 "$SRC/chrome/app/theme/chromium/product_logo_${size}.png"
            fi
          done

          echo "✅ 图标替换完成"

      # ── 7. 打包 ──────────────────────────────────────────────────────
      - name: Package
        working-directory: ungoogled-chromium-windows
        run: python package.py

      # ── 8. 打包安装包 ──────────────────────────────────────────────
      - name: Package installer
        working-directory: ungoogled-chromium-windows
        run: python package.py

      # ── 8. 上传 artifact（构建成功后在 Actions 页面下载） ─────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: yelu-browser-windows
          path: |
            ungoogled-chromium-windows/build/installer/*.exe
            ungoogled-chromium-windows/build/installer/*.zip
          retention-days: 7
          if-no-files-found: warn
