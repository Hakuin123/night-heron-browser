name: Build 夜鹭浏览器

on:
  workflow_dispatch: # 只手动触发，省 Actions 额度

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ── 1. 检出本仓库（含你的 patch 和图标） ──────────────────────────
      - name: Checkout yelu repo
        uses: actions/checkout@v4
        with:
          path: yelu

      # ── 2. 检出 ungoogled-chromium-windows（作为构建基础） ────────────
      - name: Checkout ungoogled-chromium-windows
        uses: actions/checkout@v4
        with:
          repository: ungoogled-software/ungoogled-chromium-windows
          path: ungoogled-chromium-windows
          submodules: recursive
          # 建议锁定到某个 tag，避免上游改动导致构建失败
          # ref: 'xxx.x.xxxx.xxx-1'

      # ── 3. 把你的品牌 patch 注入到 ungoogled-chromium-windows ─────────
      - name: Inject yelu branding patches
        shell: bash
        run: |
          cp yelu/patches/yelu-branding-strings.patch \
             ungoogled-chromium-windows/patches/yelu-branding-strings.patch
          # 追加到 series 末尾（在所有 ungoogled patch 之后应用）
          echo "yelu-branding-strings.patch" >> ungoogled-chromium-windows/patches/series

      # ── 4. 环境准备 ───────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ungoogled-chromium-windows
        run: pip install httplib2==0.22.0

      # 激活 Visual Studio 编译器环境（build.py 依赖 cl.exe / link.exe）
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # ── 5. 下载并解包 Chromium 源码 ──────────────────────────────────
      # build.py 不接受子命令，直接运行会执行完整流程
      # 但源码需要先到位才能替换图标，所以分两阶段：
      # 先只做 retrieve + unpack（通过 ungoogled 的 utils 脚本单独调用）
      - name: Retrieve Chromium source downloads
        working-directory: ungoogled-chromium-windows
        run: |
          mkdir -p build\download_cache
          python ungoogled-chromium\utils\downloads.py retrieve `
            -i downloads.ini -c build\download_cache

      - name: Unpack Chromium source
        working-directory: ungoogled-chromium-windows
        run: |
          python ungoogled-chromium\utils\downloads.py unpack `
            -i downloads.ini -c build\download_cache build\src

      # ── 6. 替换图标（源码已解包，patch 尚未应用）─────────────────────
      - name: Replace branding icons
        shell: bash
        run: |
          SRC="ungoogled-chromium-windows/build/src"
          BRANDING="yelu/branding"

          cp "$BRANDING/chrome.ico" \
             "$SRC/chrome/app/theme/chromium/win/chrome.ico"

          for size in 16 24 32 48 64 128 256; do
            if [ -f "$BRANDING/logo_${size}.png" ]; then
              cp "$BRANDING/logo_${size}.png" \
                 "$SRC/chrome/app/theme/chromium/product_logo_${size}.png"
            fi
          done

          echo "✅ 图标替换完成"

      # ── 7. Apply patches、剪枝、生成 GN 配置、编译 ───────────────────
      # 源码和图标就位后，跑完整 build.py（跳过已完成的 download 阶段）
      - name: Apply patches & Build
        working-directory: ungoogled-chromium-windows
        run: python build.py

      # ── 8. 打包安装包 ──────────────────────────────────────────────
      - name: Package installer
        working-directory: ungoogled-chromium-windows
        run: python package.py

      # ── 8. 上传 artifact（构建成功后在 Actions 页面下载） ─────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: yelu-browser-windows
          path: |
            ungoogled-chromium-windows/build/installer/*.exe
            ungoogled-chromium-windows/build/installer/*.zip
          retention-days: 7
          if-no-files-found: warn
